# GitHub Actions Release Workflow for iiCourseWPF
# 触发方式: 推送标签 v* 或手动触发

name: Release iiCourseWPF

on:
  # 当推送版本标签时触发 (例如: v1.0.0)
  push:
    tags:
      - 'v*'
  # 允许手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.8.0)'
        required: true
        default: '1.8.0'
      prerelease:
        description: '是否为预发布版本'
        type: boolean
        required: false
        default: false

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_PATH: 'iiCourseWPF.sln'
  MAIN_PROJECT: 'iiCourseWPF/iiCourseWPF.csproj'
  # 代码签名配置
  # 支持两种方式：
  # 1. 本地证书: 设置 CERTIFICATE_BASE64 和 CERTIFICATE_PASSWORD
  # 2. SignPath: 设置 SIGNPATH_API_TOKEN (推荐开源项目)
  ENABLE_LOCAL_SIGNING: ${{ secrets.CERTIFICATE_BASE64 != '' }}
  ENABLE_SIGNPATH: ${{ secrets.SIGNPATH_API_TOKEN != '' }}

jobs:
  # 构建和测试
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      assembly_version: ${{ steps.version.outputs.assembly_version }}

    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 设置 .NET 9.0
      - name: 设置 .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 提取版本号
      - name: 提取版本号
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $tag = '${{ github.ref_name }}'
            $version = $tag -replace '^v', ''
          }
          $assemblyVersion = "$version.0"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "assembly_version=$assemblyVersion" >> $env:GITHUB_OUTPUT
          Write-Host "版本: $version"
          Write-Host "程序集版本: $assemblyVersion"

      # 还原 NuGet 包
      - name: 还原 NuGet 包
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      # 更新项目版本号
      - name: 更新版本号
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $assemblyVersion = '${{ steps.version.outputs.assembly_version }}'

          # 更新主项目
          $mainProject = '${{ env.MAIN_PROJECT }}'
          [xml]$xml = Get-Content $mainProject
          $xml.Project.PropertyGroup.Version = $version
          $xml.Project.PropertyGroup.AssemblyVersion = $assemblyVersion
          $xml.Project.PropertyGroup.FileVersion = $assemblyVersion
          $xml.Save($mainProject)

          # 更新 Core 项目
          $coreProject = 'iiCourse.Core/iiCourse.Core.csproj'
          [xml]$xml = Get-Content $coreProject
          $xml.Project.PropertyGroup.Version = $version
          $xml.Project.PropertyGroup.AssemblyVersion = $assemblyVersion
          $xml.Project.PropertyGroup.FileVersion = $assemblyVersion
          $xml.Save($coreProject)

          Write-Host "版本号已更新为: $version"

      # 构建项目 (Release 配置)
      - name: 构建项目
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      # 运行测试 (如果有测试项目)
      - name: 运行测试
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal
        continue-on-error: true

      # 发布自包含应用 (x64)
      - name: 发布应用 (x64 自包含)
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish/x64 `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      # 发布框架依赖应用 (x64) - 单文件，包含运行时文件
      - name: 发布应用 (x64 框架依赖)
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --output ./publish/x64-framework `
            -p:PublishSingleFile=true

      # 发布纯框架依赖应用 - 需要本地安装 .NET 9
      - name: 发布应用 (纯框架依赖 - 需安装.NET 9)
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} `
            --configuration Release `
            --self-contained false `
            --output ./publish/dotnet9-required

      # 代码签名 - 方式1: 使用本地证书
      - name: 代码签名 (本地证书)
        if: env.ENABLE_LOCAL_SIGNING == 'true'
        shell: pwsh
        run: |
          # 解码证书
          $certBytes = [Convert]::FromBase64String('${{ secrets.CERTIFICATE_BASE64 }}')
          $certPath = "$env:TEMP\signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          
          # 签名所有可执行文件
          $executables = Get-ChildItem -Path ./publish -Recurse -Include "*.exe" -ErrorAction SilentlyContinue
          foreach ($exe in $executables) {
            Write-Host "正在签名: $($exe.FullName)"
            & signtool.exe sign `
              /f "$certPath" `
              /p '${{ secrets.CERTIFICATE_PASSWORD }}' `
              /tr "http://timestamp.digicert.com" `
              /td sha256 `
              /fd sha256 `
              "$($exe.FullName)"
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "签名失败: $($exe.FullName)"
            }
          }
          
          # 清理证书文件
          Remove-Item $certPath -Force -ErrorAction SilentlyContinue
          Write-Host "本地证书签名完成"

      # 为 SignPath 打包未签名文件
      - name: 打包未签名文件 (SignPath)
        if: env.ENABLE_SIGNPATH == 'true' && env.ENABLE_LOCAL_SIGNING != 'true'
        shell: pwsh
        run: |
          # 打包所有待签名文件
          Compress-Archive -Path ./publish/x64/iiCourseWPF.exe -DestinationPath "./unsigned-artifact.zip" -Force
          Write-Host "未签名文件已打包"

      # 上传未签名文件供 SignPath 使用
      - name: 上传未签名文件
        if: env.ENABLE_SIGNPATH == 'true' && env.ENABLE_LOCAL_SIGNING != 'true'
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifact
          path: ./unsigned-artifact.zip
          retention-days: 1

      # 代码签名 - 方式2: 使用 SignPath (推荐开源项目)
      - name: 代码签名 (SignPath)
        if: env.ENABLE_SIGNPATH == 'true' && env.ENABLE_LOCAL_SIGNING != 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '401c3aae-8e92-4497-a6fe-2572dd3c7f1f'
          project-slug: 'iiCourseWPF'
          signing-policy-slug: 'ReleaseSigning'
          artifact-configuration-slug: '${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}'
          github-artifact-id: '${{ steps.upload-unsigned-artifact.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: './publish/signed'

      # 如果使用了 SignPath，替换为签名后的文件
      - name: 替换为签名文件 (SignPath)
        if: env.ENABLE_SIGNPATH == 'true' && env.ENABLE_LOCAL_SIGNING != 'true'
        shell: pwsh
        run: |
          # 解压签名后的文件
          if (Test-Path './publish/signed/unsigned-artifact.zip') {
            Expand-Archive -Path './publish/signed/unsigned-artifact.zip' -DestinationPath './publish/signed-extracted' -Force
            # 复制签名后的 exe 到原位置
            Copy-Item -Path './publish/signed-extracted/iiCourseWPF.exe' -Destination './publish/x64/iiCourseWPF.exe' -Force
            Write-Host "已替换为 SignPath 签名文件"
          }

      # 打包自包含版本
      - name: 打包自包含版本
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          Compress-Archive -Path ./publish/x64/* -DestinationPath "./iiCourseWPF-v$version-win-x64-self-contained.zip" -Force

      # 打包框架依赖版本
      - name: 打包框架依赖版本
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          Compress-Archive -Path ./publish/x64-framework/* -DestinationPath "./iiCourseWPF-v$version-win-x64-framework.zip" -Force

      # 打包纯框架依赖版本 (需安装 .NET 9)
      - name: 打包纯框架依赖版本
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          Compress-Archive -Path ./publish/dotnet9-required/* -DestinationPath "./iiCourseWPF-v$version-dotnet9-required.zip" -Force

      # 上传构建产物
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            ./iiCourseWPF-v*.zip
          retention-days: 30

  # 创建 GitHub Release
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 下载构建产物
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts

      # 列出构建产物
      - name: 列出构建产物
        run: ls -la ./artifacts

      # 创建 Release
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && format('iiCourseWPF v{0}', github.event.inputs.version) || format('iiCourseWPF {0}', github.ref_name) }}
          body: |
            ## iiCourseWPF ${{ needs.build.outputs.version }}

            ### 下载

            | 版本 | 说明 | 文件大小 |
            |------|------|----------|
            | 自包含版本 | 无需安装 .NET 9 运行时 | ~50MB |
            | 框架依赖版本 | 需要安装 .NET 9 运行时 | ~5MB |
            | 纯框架依赖版本 | 必须安装 .NET 9 运行时，体积最小 | ~200KB |

            ### 安装说明

            **自包含版本 (推荐)**
            1. 下载 `iiCourseWPF-v${{ needs.build.outputs.version }}-win-x64-self-contained.zip`
            2. 解压到任意文件夹
            3. 运行 `iiCourseWPF.exe`

            **框架依赖版本**
            1. 先安装 [.NET 9.0 运行时](https://dotnet.microsoft.com/download/dotnet/9.0)
            2. 下载 `iiCourseWPF-v${{ needs.build.outputs.version }}-win-x64-framework.zip`
            3. 解压到任意文件夹
            4. 运行 `iiCourseWPF.exe`

            **纯框架依赖版本 (体积最小)**
            1. 先安装 [.NET 9.0 运行时](https://dotnet.microsoft.com/download/dotnet/9.0)
            2. 下载 `iiCourseWPF-v${{ needs.build.outputs.version }}-dotnet9-required.zip`
            3. 解压到任意文件夹
            4. 运行 `iiCourseWPF.exe`
            > ⚠️ 此版本不包含任何运行时文件，必须确保系统已安装 .NET 9

            ### 校验

            文件 SHA256 校验和可在发布页面查看。

            ---
            **完整更新日志**: 参见 [CHANGELOG.md](./docs/changelog.md)
          files: ./artifacts/*.zip
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || false }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 生成校验和
  checksum:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 下载构建产物
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts

      # 生成校验和文件
      - name: 生成 SHA256 校验和
        run: |
          cd ./artifacts
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      # 上传校验和到 Release
      - name: 上传校验和
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          files: ./artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
